name: docker-build-and-push

on:
  workflow_call:
    inputs:
      VERSION_LABEL:
        required: true
        type: string
      ENVIRONMENT:
        required: true
        type: string
        description: "dev | prod"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Read upstream ref
        id: upstream
        run: echo "REF=$(tr -d '[:space:]' < upstream-ref.txt)" >> "$GITHUB_OUTPUT"

      - name: Prepare image tags
        id: prep
        run: |
          REPO="ghcr.io/${{ github.repository }}"
          {
            echo "tags<<EOF"
            if [ "${{ inputs.ENVIRONMENT }}" = "dev" ]; then
              echo "${REPO}:latest-dev"
              echo "${REPO}:${{ inputs.VERSION_LABEL }}"
            else
              echo "${REPO}:${{ inputs.VERSION_LABEL }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          build-args: |
            UPSTREAM_REF=${{ steps.upstream.outputs.REF }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  tagging:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    if: inputs.ENVIRONMENT == 'prod'

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag release aliases
        run: |
          VERSION="${{ inputs.VERSION_LABEL }}"
          REPO="ghcr.io/${{ github.repository }}"
          MAJOR=$(echo "${VERSION}" | cut -d. -f1)
          MINOR=$(echo "${VERSION}" | cut -d. -f2)
          docker buildx imagetools create \
            -t "${REPO}:latest" \
            -t "${REPO}:${VERSION}" \
            "${REPO}:${VERSION}"
          docker buildx imagetools create \
            -t "${REPO}:${MAJOR}" \
            "${REPO}:${VERSION}"
          docker buildx imagetools create \
            -t "${REPO}:${MAJOR}.${MINOR}" \
            "${REPO}:${VERSION}"

  cleanup:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - tagging
    if: always() && !cancelled() && needs.build-and-push.result == 'success'
    steps:
      - name: Delete untagged images
        uses: Chizkiyahu/delete-untagged-ghcr-action@v6.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository_owner: ${{ github.repository_owner }}
          package_name: meshflow-rf-propagation
          owner_type: user
          untagged_only: true
